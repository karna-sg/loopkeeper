name: CI

# PR checks: gives the Test stage + merge gate real signal — the worker's auto-opened PRs show
# green/red, and `main` can require this check. Push-to-main verification lives in deploy.yml
# (verify → deploy) so CI doesn't run twice on a merge.
on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r lint
      - run: pnpm -r test
